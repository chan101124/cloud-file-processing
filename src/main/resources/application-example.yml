# Copy this file to application.yml and update values for your AWS and DB setup.
spring:
  datasource:
    url: jdbc:mysql://java-demo-db.cnokogu2m09s.ap-southeast-1.rds.amazonaws.com:3306/java-demo-db
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: update

app:
  aws:
    region: ap-southeast-1
    s3-bucket-name: quan-javajdemo-bucket
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY}
    sqs-queue-url: https://sqs.ap-southeast-1.amazonaws.com/<account-id>/<queue-name>
  worker:
    poll-delay-ms: 3000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
